<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Command Centre</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div class="max-w-5xl mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
      <div>
        <h1 class="text-2xl font-bold text-white">Financial Command Centre</h1>
        <p class="text-xs text-slate-400">Live Multi-Month Aggregation & Planning</p>
      </div>
      <button onclick="refreshDashboard()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
        Sync Live Data
      </button>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
        <span class="text-xs text-slate-400 uppercase tracking-wider block">Net Income</span>
        <span id="metric-income" class="text-2xl font-bold text-emerald-400">£0.00</span>
      </div>
      <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
        <span class="text-xs text-slate-400 uppercase tracking-wider block">Total Actual Outgoings</span>
        <span id="metric-outgoings" class="text-2xl font-bold text-rose-400">£0.00</span>
      </div>
      <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
        <span class="text-xs text-slate-400 uppercase tracking-wider block">Total Amount Saved</span>
        <span id="metric-saved" class="text-2xl font-bold text-blue-400">£0.00</span>
      </div>
    </div>

    <section class="mb-8">
      <h2 class="text-lg font-semibold text-amber-400 mb-3 flex items-center gap-2">
        <span>🤖</span> Financial Advisor Insights
      </h2>
      <div id="advisor-insights" class="space-y-2">
        <div class="text-slate-500 text-sm bg-slate-800/50 p-4 rounded-xl border border-slate-800">Running data analysis...</div>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 lg:col-span-2">
        <h3 class="text-sm font-semibold text-slate-300 mb-3">Budget vs Actual Allocation</h3>
        <div class="relative h-72">
          <canvas id="budgetVsActualChart"></canvas>
        </div>
      </div>
      
      <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
        <h3 class="text-sm font-semibold text-slate-300 mb-3">Take-home Utilisation Gauge</h3>
        <div class="relative h-72 flex flex-col justify-center items-center">
          <div class="w-full h-48 relative">
            <canvas id="utilisationPieChart"></canvas>
          </div>
          <div id="gauge-label" class="text-xs text-slate-400 mt-2 text-center"></div>
        </div>
      </div>
    </section>

    <section class="bg-slate-800 p-4 rounded-2xl border border-slate-700 mb-8">
      <h3 class="text-sm font-semibold text-slate-300 mb-3">Month-on-Month Expenditure Trends</h3>
      <div class="relative h-64">
        <canvas id="historicalTrendChart"></canvas>
      </div>
    </section>

    <div class="flex items-center gap-2 bg-slate-800 p-4 rounded-xl border border-slate-700 inline-flex">
      <label class="text-sm text-slate-400">Focus Month:</label>
      <select id="month-filter" onchange="renderActiveMonthCharts()" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm text-white focus:outline-none">
        </select>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
