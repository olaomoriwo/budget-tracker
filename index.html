<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Budget Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div class="max-w-4xl mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
      <div>
        <h1 class="text-2xl font-bold text-white">Financial Command Centre</h1>
        <p class="text-xs text-slate-400">Live Multi-Month Aggregation & Planning</p>
      </div>
      <button onclick="refreshDashboard()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
        Sync Live Data
      </button>
    </header>

    <section class="mb-8">
      <h2 class="text-lg font-semibold text-amber-400 mb-3 flex items-center gap-2">
        <span>🤖</span> Financial Advisor Insights
      </h2>
      <div id="advisor-insights" class="space-y-2">
        <div class="text-slate-500 text-sm bg-slate-800/50 p-4 rounded-xl border border-slate-800">
          Running data analysis engine...
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
        <h3 class="text-sm font-semibold text-slate-300 mb-3">Budget vs Actual (Selected Month)</h3>
        <div class="relative h-64">
          <canvas id="budgetVsActualChart"></canvas>
        </div>
      </div>
      
      <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
        <h3 class="text-sm font-semibold text-slate-300 mb-3">Month-on-Month Expense Trends</h3>
        <div class="relative h-64">
          <canvas id="historicalTrendChart"></canvas>
        </div>
      </div>
    </section>

    <div class="flex items-center gap-2 mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700 inline-flex">
      <label class="text-sm text-slate-400">Focus Month:</label>
      <select id="month-filter" onchange="renderActiveMonthCharts()" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-indigo-500">
        </select>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
