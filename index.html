<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Budget Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div class="max-w-md mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold text-white">Budget Tracker</h1>
        <p class="text-xs text-slate-400">Live spreadsheet synchronisation</p>
      </div>
      <button onclick="fetchBudgetData()" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg text-sm font-medium transition">
        Sync Now
      </button>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
        <span class="text-xs text-slate-400 uppercase">Gross Income</span>
        <div id="salary-before" class="text-xl font-bold text-slate-300 mt-1">£0.00</div>
      </div>
      <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
        <span class="text-xs text-slate-400 uppercase">Net Take-Home</span>
        <div id="salary-after" class="text-xl font-bold text-emerald-400 mt-1">£0.00</div>
      </div>
    </div>

    <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 mb-6">
      <h2 class="text-lg font-semibold text-white mb-4">Log New Expense</h2>
      <form id="expense-form" onsubmit="logExpense(event)" class="space-y-4">
        <div>
          <label class="block text-xs uppercase text-slate-400 mb-1">Category</label>
          <select id="expense-item" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-200">
            <option value="Feeding">Feeding (Groceries)</option>
            <option value="Transport">Transport (Commute)</option>
            <option value="Utility Bills">Utility Bills</option>
          </select>
        </div>
        <div>
          <label class="block text-xs uppercase text-slate-400 mb-1">Amount Spent (£)</label>
          <input type="number" step="0.01" id="expense-amount" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-200" placeholder="0.00">
        </div>
        <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium p-3 rounded-lg transition">
          Post to Spreadsheet
        </button>
      </form>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-white">Commitments & Budgets</h2>
      
      <div class="space-y-3" id="budget-list">
        <div class="animate-pulse text-center text-slate-500 py-6">Connecting to active sheet...</div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
